{# Shared edit/add fields. Expects: tune, action, modal (bool), form_action, tune_type_suggestions, key_suggestions. practice_groups from context. #}
<form method="post" class="tune-form" id="tuneEditForm" action="{{ form_action }}"
      {%- if tune %} data-tune-id="{{ tune.id }}" data-update-url="{{ url_for('update_tune_field', tune_id=tune.id) }}"{% endif %}>
  {% if modal %}
  <input type="hidden" name="modal" value="1" />
  {% endif %}
  {% include "tune_form_fields.html" %}
</form>
